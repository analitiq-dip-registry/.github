name: Notify Issue Agent (reusable)

# Org-wide reusable dispatch logic for the Analitiq issue-agent. Each repo carries a
# thin caller workflow that declares the issues/issue_comment triggers and calls this
# with `secrets: inherit`. Keeping the guard and the API call here means the behavior
# is maintained in ONE place for the whole org: edit this file and every repo's next
# matching event uses the new logic (callers pin @main).
#
# No GitHub API access is needed: the request is authenticated with the
# ISSUE_AGENT_API_KEY org secret (x-api-key header) against the endpoint in the
# ANALITIQ_WEBHOOK_NEW_ISSUE org variable, and the payload is read from the caller's
# event context. No checkout, no GITHUB_TOKEN calls — so grant the token no scopes.
on:
  workflow_call:

permissions: {}

jobs:
  notify-issue-agent:
    # Repos in this org are public, so anyone can open issues or comment. Dispatch only
    # when the trigger is from Analitiq-Bot, gated at the job level so any other actor
    # skips the job entirely and the API key is never used:
    #   - an issue opened by Analitiq-Bot, OR
    #   - an Analitiq-Bot comment starting with "/dispatch" on an issue (not a PR).
    # The leading "/dispatch" marker is required on comments so the issue-agent's own
    # bot comments don't re-trigger a dispatch loop; anchoring with startsWith (vs a
    # substring match) also stops a bot comment that merely quotes "/dispatch" in prose
    # from firing. The login fields are set by GitHub and are not user-forgeable.
    if: >-
      (github.event_name == 'issues'
        && github.event.issue.user.login == 'Analitiq-Bot')
      || (github.event_name == 'issue_comment'
        && github.event.comment.user.login == 'Analitiq-Bot'
        && github.event.issue.pull_request == null
        && startsWith(github.event.comment.body, '/dispatch'))
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch issue to Analitiq issue-agent
        env:
          API_URL: ${{ vars.ANALITIQ_WEBHOOK_NEW_ISSUE }}
          API_KEY: ${{ secrets.ISSUE_AGENT_API_KEY }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [ -z "${API_URL:-}" ]; then
            echo "::error::Org variable ANALITIQ_WEBHOOK_NEW_ISSUE is not set."
            exit 1
          fi
          if [ -z "${API_KEY:-}" ]; then
            echo "::error::Org secret ISSUE_AGENT_API_KEY is not set."
            exit 1
          fi
          if ! printf '%s' "$ISSUE_NUMBER" | grep -Eq '^[0-9]+$'; then
            echo "::error::Issue number '$ISSUE_NUMBER' is not a positive integer."
            exit 1
          fi

          # Build the payload with jq so the strings are escaped correctly and
          # issue_number serializes as a JSON integer: --argjson (NOT --arg) keeps it
          # unquoted, because the gateway requires an integer and rejects "42" with a
          # 400. Exactly three keys — the gateway model is additionalProperties:false,
          # so any extra field is likewise rejected with a 400.
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --argjson issue_number "$ISSUE_NUMBER" \
            --arg base_branch "$BASE_BRANCH" \
            '{repo: $repo, issue_number: $issue_number, base_branch: $base_branch}')

          echo "Dispatching: $PAYLOAD"

          MAX_ATTEMPTS=3
          attempt=1
          while :; do
            set +e
            HTTP_CODE=$(curl --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              -o response_body.txt \
              -D response_headers.txt \
              -w '%{http_code}' \
              -X POST "$API_URL" \
              -H "x-api-key: $API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            CURL_RC=$?
            set -e

            BODY=$(cat response_body.txt 2>/dev/null || true)

            # Transport-level failure (DNS, connection refused, TLS, timeout): curl
            # exits non-zero and reports status 000. This is the class most worth
            # retrying, so back off briefly and try again before giving up.
            if [ "$CURL_RC" -ne 0 ] || [ -z "$HTTP_CODE" ] || [ "$HTTP_CODE" = "000" ]; then
              if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
                echo "::error::Transport error contacting issue-agent (curl rc=$CURL_RC, http=${HTTP_CODE:-none}); retries exhausted after $attempt attempts."
                exit 1
              fi
              echo "::warning::Transport error (curl rc=$CURL_RC). Retrying in 5s (attempt $attempt/$MAX_ATTEMPTS)."
              sleep 5
              attempt=$((attempt + 1))
              continue
            fi

            case "$HTTP_CODE" in
              202)
                echo "✅ 202 — job submitted."
                exit 0
                ;;
              200)
                echo "✅ 200 — a job for this repo+issue is already active (dedup, no-op)."
                exit 0
                ;;
              429)
                # Honor Retry-After (delta-seconds). Default to 120 when the header is
                # absent or non-numeric (the spec also permits an HTTP-date form, which
                # we don't parse); clamp so an outsized value can't stall the runner.
                RETRY_AFTER=$(grep -i '^retry-after:' response_headers.txt | tail -n1 | awk '{print $2}' | tr -d '\r')
                case "$RETRY_AFTER" in
                  ''|*[!0-9]*) RETRY_AFTER=120 ;;
                esac
                if [ "$RETRY_AFTER" -gt 300 ]; then RETRY_AFTER=300; fi
                if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
                  echo "::error::429 — concurrency cap reached; retries exhausted after $attempt attempts. The issue was not dispatched; re-run this workflow to retry."
                  echo "$BODY"
                  exit 1
                fi
                echo "::warning::429 — concurrency cap reached. Retrying in ${RETRY_AFTER}s (attempt $attempt/$MAX_ATTEMPTS)."
                sleep "$RETRY_AFTER"
                attempt=$((attempt + 1))
                ;;
              400)
                echo "::error::400 — payload failed schema validation."
                echo "$BODY"
                exit 1
                ;;
              403)
                echo "::error::403 — bad or missing API key (ISSUE_AGENT_API_KEY)."
                echo "$BODY"
                exit 1
                ;;
              *)
                echo "::error::Issue-agent dispatch failed with HTTP ${HTTP_CODE}."
                echo "$BODY"
                exit 1
                ;;
            esac
          done
